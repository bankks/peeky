name: Peeky
options:
  bundleIdPrefix: com.peeky
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

packages:
  Ink:
    url: https://github.com/johnsundell/ink
    from: 0.1.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  Peeky:
    type: application
    platform: macOS
    sources:
      - path: PeekyApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeky.app
        INFOPLIST_FILE: PeekyApp/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Ink
      - target: PeekyExtension
        embed: true
    entitlements:
      path: PeekyApp/Peeky.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups: [group.com.peeky]

  PeekyGenerator:
    type: bundle
    platform: macOS
    sources:
      - path: PeekyGenerator
        excludes:
          - "Info.plist"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeky.generator
        INFOPLIST_FILE: PeekyGenerator/Info.plist
        WRAPPER_EXTENSION: qlgenerator
        MACH_O_TYPE: mh_bundle
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - package: Ink

  PeekyExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: PeekyExtension
        excludes:
          - "**/*.html"
          - "**/*.css"
          - "**/*.js"
          - "FrontMatterParser.swift"
          - "HTMLTemplate.swift"
          - "MarkdownRenderer.swift"
          - "PreviewProvider.swift"
      - path: Shared
    resources:
      - PeekyExtension/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeky.app.extension
        INFOPLIST_FILE: PeekyExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Ink
    entitlements:
      path: PeekyExtension/PeekyExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups: [group.com.peeky]
